# Maximum number of papers to publish in a given run
# If this value is zero, all new papers matching the criteria are published
# Default value: 0
throttle: 10

# Time (in seconds) to wait between two tweets
# Default value: 5
wait_time: 30

# Should the feed list be randomly shuffled?
# Avoids tweeting always the same journals first/last
# Default value: true
shuffle_feeds: true

# URLs matching these regular expressions will not be tweeted
# Used e.g. for Wiley journals that republish old content with new URLs
blacklist:
  - "pericles.pericles-prod.literatumonline.com"
  - "www.onlinelibrary.wiley.com"

# Keywords for filtering papers (grouped by category)
keywords:
  metals:
    - ruthenium
    - iridium
    - osmium
    - platinum
    - rhenium
  therapy:
    - cancer
    - anticancer
    - cytotoxic
    - phototoxic
  photo:
    - photodynamic
    - photoactivated
    - photosensitizer
    - ROS
    - singlet oxygen
  chemistry:
    - coordination complex
    - metal complex
    - organometallic

scoring:
  direct_exclusions:
    - "Author Correction"
    - "Publisher Correction"
    - "Corrigendum"
    - "Erratum"
    - "Retraction"
  contexts:
    - name: therapy_context
      terms:
        - PDT
        - PACT
        - photodynamic
        - photoactivated
        - phototoxicity
        - cytotoxicity
        - cytotoxic
        - anticancer
        - cancer
        - tumor
        - tumour
        - cell line
        - in vitro
        - in vivo
        - apoptosis
  groups:
    - name: photo_core
      weight: 3
      terms:
        - PDT
        - PACT
      label_map:
        PDT: PDT
        PACT: PACT
    - name: photo_support
      weight: 2
      terms:
        - photodynamic
        - photoactivated
        - photosensitizer
        - photosensitiser
        - phototoxicity
        - singlet oxygen
        - ROS
        - reactive oxygen species
        - visible light
        - NIR
      label_map:
        photodynamic: photodynamic
        photoactivated: photoactivated
        photosensitizer: photosensitizer
        photosensitiser: photosensitiser
        phototoxicity: phototoxicity
        singlet oxygen: singlet oxygen
        ROS: ROS
        reactive oxygen species: ROS
        visible light: visible light
        NIR: NIR
    - name: therapy
      weight: 2
      terms:
        - anticancer
        - cancer
        - tumor
        - tumour
        - cytotoxicity
        - cytotoxic
        - apoptosis
      label_map:
        anticancer: anticancer
        cancer: cancer
        tumor: tumor
        tumour: tumour
        cytotoxicity: cytotoxicity
        cytotoxic: cytotoxic
        apoptosis: apoptosis
    - name: bio_context
      weight: 1
      terms:
        - cell line
        - in vitro
        - in vivo
      label_map:
        cell line: cell line
        in vitro: in vitro
        in vivo: in vivo
    - name: chemistry
      weight: 1
      terms:
        - coordination complex
        - metal complex
        - organometallic
        - polypyridyl
      label_map:
        coordination complex: coordination complex
        metal complex: metal complex
        organometallic: organometallic
        polypyridyl: polypyridyl
    - name: metals
      weight: 2
      terms:
        - ruthenium
        - iridium
        - osmium
        - platinum
        - rhenium
      label_map:
        ruthenium: Ru
        iridium: Ir
        osmium: Os
        platinum: Pt
        rhenium: Re
    - name: photocatalysis_negative
      weight: -3
      terms:
        - photocatalysis
        - photocatalyst
        - hydrogen evolution
        - water splitting
        - CO2 reduction
        - pollutant degradation
        - environmental remediation
        - dye degradation
      label_map:
        photocatalysis: photocatalysis
        photocatalyst: photocatalyst
        hydrogen evolution: hydrogen evolution
        water splitting: water splitting
        CO2 reduction: CO2 reduction
        pollutant degradation: pollutant degradation
        environmental remediation: environmental remediation
        dye degradation: dye degradation
    - name: surface_negative
      weight: -2
      requires_absence_of:
        - therapy_context
      terms:
        - surface
        - surfaces
        - surface chemistry
        - surface modification
        - surface functionalization
        - interface
        - interfacial
        - adsorption
        - heterogeneous
        - substrate
        - electrode
        - film
        - thin film
      label_map:
        surface: surface
        surfaces: surfaces
        surface chemistry: surface chemistry
        surface modification: surface modification
        surface functionalization: surface functionalization
        interface: interface
        interfacial: interfacial
        adsorption: adsorption
        heterogeneous: heterogeneous
        substrate: substrate
        electrode: electrode
        film: film
        thin film: thin film
    - name: weak_negative
      weight: -1
      requires_absence_of:
        - therapy_context
      terms:
        - sensor
        - detection
        - imaging
        - environmental
      label_map:
        sensor: sensor
        detection: detection
        imaging: imaging
        environmental: environmental

# Active outputs (list of enabled publishers)
outputs:
  - console  # For testing, always enabled in dry-run
  - telegram
  - bluesky

newsletter:
  url: ${NEWSLETTER_URL}
  cta: "Want the weekly roundup in your inbox?"
  closing: "Subscribe to the newsletter here:"

weekly_digest:
  top_n: 10

