# Maximum number of papers to publish in a given run
# If this value is zero, all new papers matching the criteria are published
# Default value: 0
throttle: 10

# Time (in seconds) to wait between two tweets
# Default value: 5
wait_time: 30

# Should the feed list be randomly shuffled?
# Avoids tweeting always the same journals first/last
# Default value: true
shuffle_feeds: true

# URLs matching these regular expressions will not be tweeted
# Used e.g. for Wiley journals that republish old content with new URLs
blacklist:
  - "pericles.pericles-prod.literatumonline.com"
  - "www.onlinelibrary.wiley.com"

# Keywords for filtering papers (grouped by category)
keywords:
  metals:
    - ruthenium
    - iridium
    - osmium
    - platinum
    - rhenium
  therapy:
    - cancer
    - anticancer
    - cytotoxic
    - phototoxic
  photo:
    - photodynamic
    - photoactivated
    - photosensitizer
    - ROS
    - singlet oxygen
  chemistry:
    - coordination complex
    - metal complex
    - organometallic

# Active outputs (list of enabled publishers)
outputs:
  - console  # For testing, always enabled in dry-run
  - telegram

# Optional credentials/config per output
# Uncomment and fill as needed
# twitter:
#   consumer_key: "x1F3s..."
#   consumer_secret: "3VNg..."
#   access_key: "7109..."
#   access_secret: "AdnA..."
telegram:
  token: ${TELEGRAM_TOKEN}
  chat_id: ${TELEGRAM_CHAT_ID}
