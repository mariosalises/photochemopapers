name: Weekly Top Papers Digest

on:
  schedule:
    - cron: '0 18 * * 4'
    - cron: '0 19 * * 4'
  workflow_dispatch:

jobs:
  telegram-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send weekly top papers digest
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python weekly_top_papers.py --force
          else
            python weekly_top_papers.py
          fi
