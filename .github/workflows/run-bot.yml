name: Run PapersBot

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Restore posted.dat
        uses: actions/download-artifact@v5
        with:
          name: posted-state
          path: .
        continue-on-error: true

      - name: Ensure posted.dat exists
        run: |
          if [ ! -f posted.dat ]; then
            touch posted.dat
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python papersbot.py

      - name: Upload posted.dat artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: posted-state
          path: posted.dat